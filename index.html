<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central de Prompts</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f4f6fa;
            color: #1e1e2a;
            transition: background 0.3s ease, color 0.3s ease;
            padding: 20px;
            min-height: 100vh;
        }

        body.dark {
            background: #12121c;
            color: #eaeef2;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 0;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 32px;
        }

        .header h1 {
            font-weight: 700;
            font-size: 28px;
            letter-spacing: -0.3px;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .theme-toggle {
            background: none;
            border: none;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.06);
            transition: background 0.2s;
            color: #1e1e2a;
        }

        body.dark .theme-toggle {
            background: rgba(255, 255, 255, 0.08);
            color: #eaeef2;
        }

        .theme-toggle:hover {
            background: rgba(0, 0, 0, 0.12);
        }

        body.dark .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .theme-toggle svg {
            width: 22px;
            height: 22px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 28px;
        }

        .filter-btn {
            padding: 8px 18px;
            border-radius: 30px;
            border: 1.5px solid #d0d5de;
            background: transparent;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            color: #1e1e2a;
        }

        body.dark .filter-btn {
            border-color: #3a3a4c;
            color: #eaeef2;
        }

        .filter-btn.active {
            background: #1e1e2a;
            color: #f4f6fa;
            border-color: #1e1e2a;
        }

        body.dark .filter-btn.active {
            background: #eaeef2;
            color: #12121c;
            border-color: #eaeef2;
        }

        .filter-btn:hover:not(.active) {
            background: rgba(0, 0, 0, 0.05);
        }

        body.dark .filter-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.06);
        }

        .prompts-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .prompt-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 20px 24px 24px 24px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
            transition: background 0.3s, box-shadow 0.3s;
            border: 1px solid #eef0f4;
        }

        body.dark .prompt-card {
            background: #1c1c2e;
            border-color: #2c2c42;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
        }

        .prompt-card .badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            padding: 4px 12px;
            border-radius: 20px;
            background: #eef0f4;
            color: #4a4a5a;
            margin-bottom: 10px;
        }

        body.dark .prompt-card .badge {
            background: #2c2c42;
            color: #b0b8c8;
        }

        .prompt-card .badge.edicao {
            background: #e3edfb;
            color: #1a5ba8;
        }

        body.dark .prompt-card .badge.edicao {
            background: #1a2a4a;
            color: #7ab0f0;
        }

        .prompt-card .badge.jogo {
            background: #e6f5e6;
            color: #1f7a3a;
        }

        body.dark .prompt-card .badge.jogo {
            background: #1a3a2a;
            color: #6ac08a;
        }

        .prompt-card .badge.personagem {
            background: #f5e6f5;
            color: #8a3a7a;
        }

        body.dark .prompt-card .badge.personagem {
            background: #3a1a3a;
            color: #d08ac0;
        }

        .prompt-card .badge.mundo {
            background: #f0ece4;
            color: #7a6a4a;
        }

        body.dark .prompt-card .badge.mundo {
            background: #2a261a;
            color: #c8b88a;
        }

        .prompt-card .badge.cena {
            background: #fce8e8;
            color: #a84a4a;
        }

        body.dark .prompt-card .badge.cena {
            background: #3a1a1a;
            color: #e88a8a;
        }

        .prompt-card h3 {
            font-weight: 600;
            font-size: 17px;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .prompt-card .prompt-text {
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
            color: #2c2c3a;
            margin: 10px 0 16px 0;
            padding: 12px 16px;
            background: #f8f9fc;
            border-radius: 10px;
            border-left: 3px solid #d0d5de;
            font-family: 'Inter', monospace;
            font-size: 13px;
        }

        body.dark .prompt-card .prompt-text {
            background: #14141e;
            color: #d8dce6;
            border-left-color: #3a3a52;
        }

        .prompt-card .copy-btn {
            padding: 8px 20px;
            border-radius: 30px;
            border: none;
            background: #1e1e2a;
            color: #f4f6fa;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        body.dark .prompt-card .copy-btn {
            background: #eaeef2;
            color: #12121c;
        }

        .prompt-card .copy-btn:hover {
            background: #3a3a4e;
        }

        body.dark .prompt-card .copy-btn:hover {
            background: #ffffff;
        }

        .prompt-card .copy-btn:active {
            transform: scale(0.96);
        }

        .prompt-card .copy-btn.copied {
            background: #1f8a4a;
            color: #fff;
        }

        body.dark .prompt-card .copy-btn.copied {
            background: #2aae5a;
            color: #12121c;
        }

        @media (min-width: 768px) {
            .prompts-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (min-width: 1024px) {
            .prompts-grid {
                grid-template-columns: 1fr 1fr 1fr;
            }
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #1e1e2a;
            color: #f4f6fa;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 14px;
            opacity: 0;
            transition: all 0.4s ease;
            pointer-events: none;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.2);
        }

        body.dark .toast {
            background: #eaeef2;
            color: #12121c;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Central de Prompts</h1>
            <div class="header-controls">
                <button class="theme-toggle" id="themeToggle" aria-label="Alternar tema">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 3a6 6 0 0 0 9 9 6 6 0 1 1-9-9Z" />
                    </svg>
                </button>
            </div>
        </div>

        <div class="filter-bar" id="filterBar">
            <button class="filter-btn active" data-filter="todos">Todos</button>
            <button class="filter-btn" data-filter="edicao">Edição</button>
            <button class="filter-btn" data-filter="jogo">Jogos</button>
            <button class="filter-btn" data-filter="personagem">Personagens</button>
            <button class="filter-btn" data-filter="mundo">Mundos</button>
            <button class="filter-btn" data-filter="cena">Cenas</button>
        </div>

        <div class="prompts-grid" id="promptsGrid"></div>
    </div>

    <div class="toast" id="toast">Copiado!</div>

    <script>
        (function() {
            const prompts = [
                { id: 1, titulo: "Trocar Cor do Cabelo", categoria: "edicao", texto: "Quero trocar a cor do cabelo da pessoa na foto [ANEXAR_OU_DESCREVER].\n- Cor atual: [COR_ATUAL] (ex: preto, loiro, castanho)\n- Cor desejada: [COR_DESEJADA] (ex: azul turquesa, rosa choque, prateado)\n- Ferramenta: [PROGRAMA] (ex: Photoshop, GIMP, Photopea)\n\nPassos:\n1. Selecionar o cabelo com [FERRAMENTA] (ex: máscara de canais, seleção rápida)\n2. Ajustar matiz/saturação com valores: [MATIZ_X], [SATURAÇÃO_Y]\n3. Refinar bordas com [TÉCNICA] (ex: suavizar, expandir)\n4. Adicionar mechas ou reflexos com [COR_SECUNDÁRIA]\n\nDica extra: Como manter o brilho natural e textura original?" },

                { id: 2, titulo: "Trocar Cor dos Olhos", categoria: "edicao", texto: "Quero mudar a cor dos olhos da pessoa na imagem [DESCREVER_IMAGEM].\n- Cor original: [COR_ORIGINAL]\n- Cor nova: [COR_NOVA]\n- Efeito desejado: [REALISTA/HIPER-REALISTA/FANTASIOSO]\n\nNo [PROGRAMA]:\n1. Selecionar apenas a íris com [FERRAMENTA] (evitar a pupila)\n2. Camada de ajuste de [COR] com modo de mesclagem [MODO] (ex: Color, Hue)\n3. Adicionar um leve gradiente radial para imitar o olho real\n4. Incluir reflexo de luz natural (ponto branco em [POSIÇÃO])\n\nComo fazer isso sem parecer artificial?" },

                { id: 3, titulo: "Trocar Rosto (Face Swap)", categoria: "edicao", texto: "Quero trocar o rosto da [PESSOA_A] pelo da [PESSOA_B] na foto [DESCREVER_FOTO].\nFerramenta: [PROGRAMA] (ex: Photoshop, FaceApp, Swapface)\n\nPassos detalhados:\n1. Alinhar os dois rostos pelo [REFERÊNCIA] (ex: olhos, nariz)\n2. Ajustar tom de pele usando [CURVAS/NÍVEIS]\n3. Mesclar bordas com [FERRAMENTA] (ex: Healing Brush, máscara suave)\n4. Corrigir iluminação para combinar com a cena original\n5. Ajustar proporções se necessário (tamanho do rosto)\n\nDica: Como fazer isso sem parecer Photoshop mal feito?" },

                { id: 4, titulo: "Trocar Cor da Roupa", categoria: "edicao", texto: "Quero trocar a cor da roupa da pessoa na imagem [DESCREVER].\n- Roupa atual: [TIPO] (ex: camiseta, vestido, calça) na cor [COR_ATUAL]\n- Nova cor: [COR_NOVA]\n- Ferramenta: [PROGRAMA]\n\nPassos:\n1. Selecionar a roupa com [FERRAMENTA] (ex: canais de cor, seleção de objeto)\n2. Aplicar [AJUSTE] (ex: Matiz/Saturação, Mapeamento de Gradiente)\n3. Preservar as sombras e dobras do tecido\n4. Se for estampa, usar [TÉCNICA] para não distorcer\n\nDesafio: Como trocar apenas UMA parte da roupa (ex: só a manga) e não o resto?" },

                { id: 5, titulo: "Trocar Fundo Perfeito", categoria: "edicao", texto: "Quero trocar o fundo de uma foto de [DESCREVER_SUJEITO] (ex: pessoa, produto).\nFundo atual: [FUNDO_ATUAL] (ex: parede branca, natureza)\nNovo fundo: [NOVO_FUNDO] (ex: estúdio profissional, praia, espaço sideral)\nFerramenta: [PROGRAMA]\n\nPassos:\n1. Isolar o sujeito com [FERRAMENTA] (ex: Select Subject, Pen)\n2. Refinar bordas (especialmente cabelos/fios) com [TÉCNICA]\n3. Ajustar iluminação do sujeito para combinar com o novo fundo\n4. Adicionar sombra projetada no novo fundo\n5. Aplicar correção de cor global\n\nProblemas comuns: Como lidar com cabelos rebeldes e transparência?" },

                { id: 6, titulo: "Remover Objeto da Foto", categoria: "edicao", texto: "Quero remover [OBJETO] da imagem [DESCREVER_FOTO].\n- Objeto: [DESCRIÇÃO] (ex: pessoa, poste, carro)\n- Ferramenta: [PROGRAMA]\n\nTécnicas:\n1. Content-Aware Fill (preenchimento por conteúdo)\n2. Clone Stamp (carimbo) com amostras de [ÁREA_LIMPA]\n3. Patch Tool para texturas complexas\n4. Preencher com [MÁSCARA/IA]\n\nResultado: O fundo deve ficar natural sem repetições visíveis.\nComo tratar áreas com sombras do objeto removido?" },

                { id: 7, titulo: "Substituir Céu", categoria: "edicao", texto: "Quero substituir o céu da foto [DESCREVER_FOTO] por um [TIPO_CEU] (ex: pôr do sol, estrelado, tempestade).\n- Céu atual: [DESCRIÇÃO]\n- Céu novo: [NOVO_CEU] (anexar ou descrever)\n- Ferramenta: [PROGRAMA]\n\nPassos:\n1. Selecionar o céu automaticamente com [FERRAMENTA] (ex: Select Sky)\n2. Refinar bordas em árvores/prédios\n3. Inserir novo céu como camada\n4. Ajustar o balanço de branco do primeiro plano para combinar\n5. Adicionar reflexos de luz nas superfícies\n\nDica: Como fazer a transição parecer natural em áreas complexas?" },

                { id: 8, titulo: "Olho com Gradiente (Efeito)", categoria: "edicao", texto: "Quero fazer um efeito de olho [COR_GRADIENTE] (ex: roxo e azul, dourado e vermelho).\n- Cor 1: [COR1]\n- Cor 2: [COR2]\n- Ferramenta: [PROGRAMA]\n\nTécnica no Photoshop/GIMP:\n1. Selecionar a íris com [FERRAMENTA]\n2. Aplicar gradiente radial (angle) com [MODO_DE_MESCLAGEM]\n3. Ajustar opacidade para [X]%\n4. Adicionar um brilho estrelado com pincel de [TAMANHO]px\n\nQuero um efeito tipo 'olho de gato' ou 'cyberpunk'." },

                { id: 9, titulo: "Transformar em Cartoon com IA", categoria: "edicao", texto: "Quero transformar minha foto [DESCREVER] em ilustração estilo cartoon usando IA.\n- Estilo: [ESTILO] (ex: Pixar, anime, HQ americana, caricatura)\n- Ferramenta: [IA] (ex: Midjourney, Stable Diffusion, DALL-E)\n- Nível de detalhe: [REALISTA/SIMPLIFICADO]\n\nPrompt para IA:\n'Transforme esta foto em ilustração no estilo [ESTILO], mantendo as características principais: [CARACTERÍSTICAS]. Use paleta de cores [PALETA]. Fundo: [FUNDO].'\n\nDica adicional: Como refinar o resultado no Photoshop após gerar?" },

                { id: 10, titulo: "Efeito Sombra e Luz Realista", categoria: "edicao", texto: "Quero adicionar sombras realistas em uma imagem de [DESCREVER] no [PROGRAMA].\n- Fonte de luz: [POSIÇÃO] (ex: canto superior esquerdo)\n- Intensidade: [INTENSIDADE] (1-10)\n- Cor da luz: [COR] (ex: branca, amarela, azulada)\n\nPassos:\n1. Criar camada de sombra com [FORMA]\n2. Aplicar blur gaussiano de [PX]px\n3. Ajustar opacidade para [X]%\n4. Adicionar penumbra (sombra mais suave) com [TÉCNICA]\n5. Para luz: criar camada overlay com [COR] e opacidade [Y]%\n\nComo fazer isso parecer 3D e não plano?" },

                { id: 11, titulo: "Jogo da Cobrinha (Snake)", categoria: "jogo", texto: "Crie um jogo da cobrinha (Snake) completo em HTML, CSS e JavaScript.\n\nRequisitos:\n- Tabuleiro: [TAMANHO]x[TAMANHO] (ex: 20x20)\n- Controle: Teclas [SETAS] + suporte para [TOQUE/MOUSE]\n- Pontuação: [SISTEMA] (ex: +10 por maçã)\n- Velocidade: Aumenta a cada [N] pontos\n- Obstáculos: [SIM/NÃO] (se sim, gerar a cada [X] pontos)\n- Power-ups: [LISTA] (ex: velocidade, invencibilidade)\n- Tela de Game Over com opção de reiniciar\n- Design: [TEMA] (ex: minimalista, retrô, cyberpunk)\n\nCódigo deve ser:\n- Um único arquivo HTML com CSS inline e JS embutido\n- Bem comentado em português\n- Responsivo para mobile" },

                { id: 12, titulo: "Plataforma (Mario Style)", categoria: "jogo", texto: "Crie um jogo de plataforma 2D estilo [SUPER MARIO/CELESTE] em HTML5 Canvas.\n\nElementos:\n- Personagem: [DESCRIÇÃO] (pulo, corrida, [PODER_ESPECIAL])\n- Fases: [NÚMERO] fases com dificuldade progressiva\n- Inimigos: [TIPOS] (ex: goombas, plataformas móveis, espinhos)\n- Moedas: [NÚMERO] para coletar por fase\n- Checkpoints: [SIM/NÃO]\n- Power-ups: [LISTA]\n- Física: Gravidade [VALOR], pulo [ALTURA], atrito [VALOR]\n\nExtras:\n- Mapa gerado por [ARRAY] ou [TILESET]\n- Score salvo no [LOCALSTORAGE]\n- Design com pixels [TAMANHO]px\n- Código comentado e organizado" },

                { id: 13, titulo: "Space Shooter", categoria: "jogo", texto: "Crie um jogo de nave espacial (Space Shooter) em HTML/CSS/JS.\n\nNave do jogador:\n- Movimento: [SETAS/WASD]\n- Tiro: [ESPACO/CLIQUE]\n- Power-ups: [LISTA] (tiro duplo, escudo, bomba)\n\nInimigos:\n- Tipos: [3] tipos com comportamentos diferentes\n- Padrões de ataque: [Onda/vários]\n- Chefe a cada [N] fases\n\nFundo: [ESTILO] (ex: estrelas rolando, parallax)\n\nSistema:\n- Vidas: [NÚMERO]\n- Pontuação: [SISTEMA]\n- High score salvo localmente\n- Efeitos sonoros: [SIM/NÃO] (usar Web Audio API)\n\nDesign: [TEMA] (ex: retrô, neon, futurista)\nCódigo em um único arquivo HTML." },

                { id: 14, titulo: "Memória / Blackjack", categoria: "jogo", texto: "Crie um jogo de [MEMÓRIA/PACIÊNCIA/BLACKJACK] em HTML/CSS/JS.\n\nSe for MEMÓRIA:\n- Tabuleiro: [N]x[N] cartas (ex: 4x4)\n- Temas: [TEMA] (ex: animais, emojis, bandeiras)\n- Timer: [SIM/NÃO] com recorde\n- Dificuldade: [FÁCIL/MÉDIO/DIFÍCIL]\n\nSe for BLACKJACK:\n- Baralho: [1/2/3] baralhos\n- Regras: [EXATAS] (ex: dealer para em 17, blackjack paga 3:2)\n- Estratégia básica: [MOSTRAR/ESCONDER]\n- Estatísticas: [VITÓRIAS/DERROTAS]\n\nDesign: [COR_TEMA] com animações CSS suaves.\nCódigo deve ser modular e bem comentado." },

                { id: 15, titulo: "Quiz Interativo", categoria: "jogo", texto: "Crie um jogo de quiz interativo com:\n- Categoria: [TEMA] (ex: história, ciência, filmes)\n- Número de perguntas: [N]\n- Dificuldade: [FÁCIL/MÉDIO/DIFÍCIL]\n- Formato: [MÚLTIPLA_ESCOLHA/VERDADEIRO_OU_FALSO]\n- Timer por pergunta: [N] segundos\n- Sistema de dicas: [SIM/NÃO] (ex: eliminar 2 alternativas)\n- Ranking: [SIM/NÃO] com nome do jogador\n\nExtras:\n- Progresso em barra\n- Feedback imediato (verde/vermelho)\n- Tela de resultados com estatísticas\n- Compartilhar resultado: [SIM/NÃO]\n\nDesign: [TEMA] (ex: minimalista, retrô, temático)\nBanco de perguntas embutido no código." },

                { id: 16, titulo: "Corrida 2D", categoria: "jogo", texto: "Crie um jogo de corrida 2D (vista de cima ou pseudo-3D) em HTML Canvas.\n\nCaracterísticas:\n- Pista: [DESENHADA] com curvas e obstáculos\n- Carro: [COR] com controles [SETAS]\n- Inimigos: [CARROS] com IA básica\n- Nitro: [SIM/NÃO] (coletável e limitado)\n- Combustível: [SIM/NÃO] com postos na pista\n- Voltas: [N] voltas para vencer\n- Placar: [NÚMERO] de adversários\n\nDesign:\n- Estilo: [PIXEL/RETRÔ/MODERNO]\n- Efeitos: partículas de fumaça, derrapagem\n- HUD: velocidade, posição, volta atual\n\nCódigo em HTML único com CSS e JS." },

                { id: 17, titulo: "Tetris / 2048 / Sudoku", categoria: "jogo", texto: "Crie um jogo de [TETRIS/2048/SUDOKU] em HTML/CSS/JS.\n\nSe for TETRIS:\n- Tabuleiro: [N]x[N] (ex: 10x20)\n- Peças: [7] peças clássicas com cores\n- Previsão da próxima peça\n- Sistema de pontuação: [LINHAS/PONTOS]\n- Níveis de velocidade: [N] níveis\n- Hold piece: [SIM/NÃO]\n\nSe for 2048:\n- Tabuleiro: [4x4 / 5x5 / 6x6]\n- Cor: [PERSONALIZADA]\n- Recorde: salvo localmente\n- Animações: suaves\n\nSe for SUDOKU:\n- Dificuldade: [FÁCIL/MÉDIO/DIFÍCIL]\n- Gerador de tabuleiros\n- Validação de movimentos\n- Dicas: [N] dicas por jogo\n\nDesign moderno e responsivo." },

                { id: 18, titulo: "Xadrez / Damas", categoria: "jogo", texto: "Crie um jogo de [XADREZ/DAMAS] completo em HTML/CSS/JS.\n\nXADREZ:\n- Peças: [ESTILO] (unicode ou desenhos)\n- Movimentos: [VALIDADOS] com regras oficiais\n- Destaque: mostrar movimentos possíveis\n- Roque, En passant, Promoção: implementados\n- IA: [NÍVEL] (ex: aleatório, minimax básico)\n- Timer: [N] minutos por jogador\n- Histórico: [SIM/NÃO] com notação\n\nDAMAS:\n- Tabuleiro: [8x8]\n- Regras: [INTERNACIONAIS/BRASILEIRAS]\n- Captura obrigatória: [SIM/NÃO]\n- IA: [BÁSICA/MÉDIA]\n\nDesign: [MADEIRA/NEO/MINIMALISTA] com sombras.\nCódigo bem estruturado com classes." },

                { id: 32, titulo: "Reino de Fantasia", categoria: "mundo", texto: "Crie um reino de fantasia chamado [NOME_REINO] no mundo de [MUNDO].\n- Geografia: [DESCRIÇÃO] (ex: montanhas, florestas, desertos)\n- Raças: [RAÇAS_PRESENTES] com [RELAÇÕES]\n- Magia: [SISTEMA_MÁGICO] (ex: elemental, runas, sangue)\n- Criaturas: [CRIATURAS_MÍTICAS] únicas\n- Economia: [MOEDA] e [PRODUTO_PRINCIPAL]\n- Monarca: [REI/RAINHA] com [PERSONALIDADE]\n- Profecia: [PROFECIA] que está se cumprindo\n- Herói: [NOME_HERÓI] com [MISSÃO]\n\nCrie um mapa mental com 5 locais importantes e sua descrição." },

                { id: 34, titulo: "Descrição de Cena de Filme", categoria: "cena", texto: "Descreva uma cena de filme com as seguintes características:\n- Gênero: [GÊNERO] (ex: suspense, ação, drama)\n- Local: [LOCAL_DETALHADO] com [ILUMINAÇÃO]\n- Personagens: [PERSONAGEM_A] fazendo [AÇÃO], [PERSONAGEM_B] reagindo\n- Som: [TRILHA_SONORA] (ex: violino tenso, silêncio, batidas)\n- Movimento de câmera: [PLANO] (ex: steadicam, drone, mão)\n- Cor dominante: [COR] (ex: azul para frieza, vermelho para perigo)\n- Diálogo: '[FALA_PERSONAGEM]'\n\nInclua elementos de: [TEMPO] (ex: chuva, neblina, pôr do sol) e faça parecer um storyboard." },

                { id: 35, titulo: "Crítica de Filme/Série", categoria: "cena", texto: "Atue como um crítico de cinema renomado ([NOME_CRÍTICO]) analisando [FILME/SÉRIE].\nAvalie:\n- Roteiro: [NOTA] - [COMENTÁRIO] (ex: 'previsível, mas emocionante')\n- Atuação: [NOTA] - destaque para [ATUADOR]\n- Direção: [NOTA] - [ESTILO] similar a [DIRETOR]\n- Fotografia: [NOTA] - melhor cena: [CENA]\n- Trilha sonora: [NOTA] - [COMPOSITOR]\n- Contexto cultural: [IMPACTO]\n\nConclusão: [RECOMENDAÇÃO] e nota final [NOTA_FINAL]/10.\nCite um filme similar para comparação: [FILME_SIMILAR]" },

                { id: 36, titulo: "Roteiro de Cena (Formato Hollywood)", categoria: "cena", texto: "Crie um roteiro no formato Hollywood para uma cena de [GÊNERO]:\n[TÍTULO_DA_CENA]\n\nCENA [NÚMERO] - [INTERIOR/EXTERIOR] - [LOCAL] - [DIA/NOITE]\n\nAÇÃO: [DESCRIÇÃO_DETALHADA] em 2 parágrafos, incluindo movimentos de câmera.\n\nPERSONAGEM_A\n[fala com emoção] '[DIÁLOGO]'\n\nPERSONAGEM_B\n[reage] '[DIÁLOGO]'\n\n(Continua com 10-15 linhas de diálogo)\n\nPERSONAGEM_A\n[fala final] '[FALAR_DRAMÁTICO]'\n\nCORTE PARA: [PRÓXIMA_CENA]" },

                { id: 37, titulo: "Transformar Música em Cena", categoria: "cena", texto: "Transforme a música '[NOME_MÚSICA]' de [ARTISTA] em uma cena cinematográfica.\n- Gênero: [GÊNERO_FILME]\n- Personagem principal: [DESCRIÇÃO]\n- Local: [LOCAL]\n- Sentimento transmitido pela música: [SENTIMENTO]\n\nDescreva:\n1. Abertura da cena (primeiros 15 segundos da música)\n2. Clímax (parte mais intensa) - o que acontece?\n3. Final (últimos acordes) - como termina?\n\nInclua marcações de tempo da música (ex: 0:00 - introdução, 0:30 - primeiro verso) e o que acontece em cada parte." },

                { id: 38, titulo: "Pôster de Filme com IA", categoria: "cena", texto: "Quero criar um pôster de filme usando IA geradora de imagem (Midjourney/DALL-E).\nEspecificações:\n- Título: [NOME_FILME]\n- Subtítulo: '[FRASE_CHAMATIVA]'\n- Gênero: [GÊNERO]\n- Personagem principal: [DESCRIÇÃO] em pose [POSA]\n- Fundo: [CENÁRIO] com [ELEMENTOS]\n- Estilo visual: [REFERÊNCIA] (ex: Saul Bass, Drew Struzan, minimalista)\n- Paleta de cores: [CORES]\n- Incluir: [ELEMENTOS_OBRIGATÓRIOS] (ex: uma lua, uma espada, olhos)\n\nPrompt para IA:\n'[PROMPT_DETALHADO]' com parâmetros: --ar [ASPECTO] --style [ESTILO] --v [VERSÃO]\n\nCréditos na parte inferior: 'Direção: [DIRETOR] | Estreia: [DATA]'" }
            ];

            const grid = document.getElementById('promptsGrid');
            const filterButtons = document.querySelectorAll('.filter-btn');
            const themeToggle = document.getElementById('themeToggle');
            const toast = document.getElementById('toast');
            let toastTimer = null;

            function renderPrompts(filter = 'todos') {
                const filtered = filter === 'todos' ? prompts : prompts.filter(p => p.categoria === filter);
                grid.innerHTML = '';
                filtered.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'prompt-card';
                    card.dataset.categoria = p.categoria;
                    const badgeMap = {
                        'edicao': 'Edição',
                        'jogo': 'Jogo',
                        'personagem': 'Personagem',
                        'mundo': 'Mundo',
                        'cena': 'Cena'
                    };
                    const label = badgeMap[p.categoria] || p.categoria;
                    card.innerHTML = `
                        <span class="badge ${p.categoria}">${label}</span>
                        <h3>${p.titulo}</h3>
                        <div class="prompt-text">${p.texto}</div>
                        <button class="copy-btn" data-id="${p.id}">Copiar Prompt</button>
                    `;
                    grid.appendChild(card);
                });

                document.querySelectorAll('.copy-btn').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        const id = parseInt(this.dataset.id);
                        const prompt = prompts.find(p => p.id === id);
                        if (prompt) {
                            navigator.clipboard.writeText(prompt.texto).then(() => {
                                this.textContent = 'Copiado!';
                                this.classList.add('copied');
                                showToast('Prompt copiado!');
                                setTimeout(() => {
                                    this.textContent = 'Copiar Prompt';
                                    this.classList.remove('copied');
                                }, 2000);
                            }).catch(() => {
                                fallbackCopy(prompt.texto, this);
                            });
                        }
                    });
                });
            }

            function fallbackCopy(text, btn) {
                const area = document.createElement('textarea');
                area.value = text;
                document.body.appendChild(area);
                area.select();
                try {
                    document.execCommand('copy');
                    btn.textContent = 'Copiado!';
                    btn.classList.add('copied');
                    showToast('Prompt copiado!');
                    setTimeout(() => {
                        btn.textContent = 'Copiar Prompt';
                        btn.classList.remove('copied');
                    }, 2000);
                } catch (err) {
                    showToast('Erro ao copiar. Tente manualmente.');
                }
                document.body.removeChild(area);
            }

            function showToast(msg) {
                toast.textContent = msg;
                toast.classList.add('show');
                if (toastTimer) clearTimeout(toastTimer);
                toastTimer = setTimeout(() => {
                    toast.classList.remove('show');
                }, 2000);
            }

            filterButtons.forEach(btn => {
                btn.addEventListener('click', function() {
                    filterButtons.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    renderPrompts(this.dataset.filter);
                });
            });

            themeToggle.addEventListener('click', function() {
                document.body.classList.toggle('dark');
                const isDark = document.body.classList.contains('dark');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
            });

            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark');
            }

            renderPrompts('todos');
        })();
    </script>
