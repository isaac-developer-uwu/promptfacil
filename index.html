<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central de Prompts</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f4f6fa;
            color: #1e1e2a;
            transition: background 0.3s ease, color 0.3s ease;
            padding: 20px;
            min-height: 100vh;
        }

        body.dark {
            background: #12121c;
            color: #eaeef2;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 0;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 32px;
        }

        .header h1 {
            font-weight: 700;
            font-size: 28px;
            letter-spacing: -0.3px;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .theme-toggle {
            background: none;
            border: none;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.06);
            transition: background 0.2s;
            color: #1e1e2a;
        }

        body.dark .theme-toggle {
            background: rgba(255, 255, 255, 0.08);
            color: #eaeef2;
        }

        .theme-toggle:hover {
            background: rgba(0, 0, 0, 0.12);
        }

        body.dark .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .theme-toggle svg {
            width: 22px;
            height: 22px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 28px;
        }

        .filter-btn {
            padding: 8px 18px;
            border-radius: 30px;
            border: 1.5px solid #d0d5de;
            background: transparent;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            color: #1e1e2a;
        }

        body.dark .filter-btn {
            border-color: #3a3a4c;
            color: #eaeef2;
        }

        .filter-btn.active {
            background: #1e1e2a;
            color: #f4f6fa;
            border-color: #1e1e2a;
        }

        body.dark .filter-btn.active {
            background: #eaeef2;
            color: #12121c;
            border-color: #eaeef2;
        }

        .filter-btn:hover:not(.active) {
            background: rgba(0, 0, 0, 0.05);
        }

        body.dark .filter-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.06);
        }

        .prompts-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .prompt-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 20px 24px 24px 24px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
            transition: background 0.3s, box-shadow 0.3s;
            border: 1px solid #eef0f4;
        }

        body.dark .prompt-card {
            background: #1c1c2e;
            border-color: #2c2c42;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
        }

        .prompt-card .badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            padding: 4px 12px;
            border-radius: 20px;
            background: #eef0f4;
            color: #4a4a5a;
            margin-bottom: 10px;
        }

        body.dark .prompt-card .badge {
            background: #2c2c42;
            color: #b0b8c8;
        }

        .prompt-card .badge.edicao {
            background: #e3edfb;
            color: #1a5ba8;
        }

        body.dark .prompt-card .badge.edicao {
            background: #1a2a4a;
            color: #7ab0f0;
        }

        .prompt-card .badge.jogo {
            background: #e6f5e6;
            color: #1f7a3a;
        }

        body.dark .prompt-card .badge.jogo {
            background: #1a3a2a;
            color: #6ac08a;
        }

        .prompt-card .badge.personagem {
            background: #f5e6f5;
            color: #8a3a7a;
        }

        body.dark .prompt-card .badge.personagem {
            background: #3a1a3a;
            color: #d08ac0;
        }

        .prompt-card .badge.mundo {
            background: #f0ece4;
            color: #7a6a4a;
        }

        body.dark .prompt-card .badge.mundo {
            background: #2a261a;
            color: #c8b88a;
        }

        .prompt-card .badge.cena {
            background: #fce8e8;
            color: #a84a4a;
        }

        body.dark .prompt-card .badge.cena {
            background: #3a1a1a;
            color: #e88a8a;
        }

        .prompt-card h3 {
            font-weight: 600;
            font-size: 17px;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .prompt-card .prompt-text {
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
            color: #2c2c3a;
            margin: 10px 0 16px 0;
            padding: 12px 16px;
            background: #f8f9fc;
            border-radius: 10px;
            border-left: 3px solid #d0d5de;
            font-family: 'Inter', monospace;
            font-size: 13px;
        }

        body.dark .prompt-card .prompt-text {
            background: #14141e;
            color: #d8dce6;
            border-left-color: #3a3a52;
        }

        .prompt-card .copy-btn {
            padding: 8px 20px;
            border-radius: 30px;
            border: none;
            background: #1e1e2a;
            color: #f4f6fa;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        body.dark .prompt-card .copy-btn {
            background: #eaeef2;
            color: #12121c;
        }

        .prompt-card .copy-btn:hover {
            background: #3a3a4e;
        }

        body.dark .prompt-card .copy-btn:hover {
            background: #ffffff;
        }

        .prompt-card .copy-btn:active {
            transform: scale(0.96);
        }

        .prompt-card .copy-btn.copied {
            background: #1f8a4a;
            color: #fff;
        }

        body.dark .prompt-card .copy-btn.copied {
            background: #2aae5a;
            color: #12121c;
        }

        @media (min-width: 768px) {
            .prompts-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (min-width: 1024px) {
            .prompts-grid {
                grid-template-columns: 1fr 1fr 1fr;
            }
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #1e1e2a;
            color: #f4f6fa;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 14px;
            opacity: 0;
            transition: all 0.4s ease;
            pointer-events: none;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.2);
        }

        body.dark .toast {
            background: #eaeef2;
            color: #12121c;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Central de Prompts</h1>
            <div class="header-controls">
                <button class="theme-toggle" id="themeToggle" aria-label="Alternar tema">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 3a6 6 0 0 0 9 9 6 6 0 1 1-9-9Z" />
                    </svg>
                </button>
            </div>
        </div>

        <div class="filter-bar" id="filterBar">
            <button class="filter-btn active" data-filter="todos">Todos</button>
            <button class="filter-btn" data-filter="edicao">Edição</button>
            <button class="filter-btn" data-filter="jogo">Jogos</button>
            <button class="filter-btn" data-filter="personagem">Personagens</button>
            <button class="filter-btn" data-filter="mundo">Mundos</button>
            <button class="filter-btn" data-filter="cena">Cenas</button>
        </div>

        <div class="prompts-grid" id="promptsGrid"></div>
    </div>

    <div class="toast" id="toast">Copiado!</div>

    <script>
        (function() {
          const prompts = [

    {

    {

    {

    {

    },
    {
        id: 34,
        titulo: "Mundo Alternativo Histórico",
        categoria: "personagem",
        texto: "Crie um mundo alternativo onde [EVENTO] não aconteceu ou teve um desfecho diferente. Descreva como seria a tecnologia, política, cultura, arte e o cotidiano das pessoas nessa linha do tempo. Cite 3 diferenças principais entre esse mundo e o nosso e as consequências de longo prazo."
    },
    {
        id: 35,
        titulo: "Planeta Alienígena",
        categoria: "personagem",
        texto: "Crie um planeta alienígena com ecossistema próprio. Dê nome, descreva sua estrela e órbita, atmosfera, gravidade e rotação. Crie 3 espécies de flora e 3 de fauna com adaptações únicas. Descreva a civilização dominante, seu nível tecnológico, idioma, sociedade e recurso mais cobiçado. Inclua um diário de exploração."

    {
        id: 36,
        titulo: "Cidade Futurista",
        categoria: "personagem",
        texto: "Crie uma cidade no futuro. Descreva sua arquitetura (brutalista, orgânica, holográfica), sistema de transporte, fonte de energia, forma de governo, estrutura social e o maior conflito atual. Narre um dia típico de um profissional e de um morador de rua para contrastar as realidades da cidade."
    },
    {
        id: 37,
        titulo: "Reino de Fantasia",
        categoria: "personagem",
        texto: "Crie um reino de fantasia com geografia detalhada, raças coexistentes (e suas relações), sistema mágico (com regras e limitações), criaturas míticas únicas, economia (moeda e produtos principais), monarca com personalidade marcante, uma profecia em andamento e 5 locais importantes com descrições vívidas."
    },
    {
        id: 38,
        titulo: "Pós-Apocalipse",
        categoria: "personagem",
        texto: "Crie um mundo pós-apocalíptico. Determine o evento causador, o tempo decorrido, a nova sociedade (tribos, cidades-estado ou monarquia), tecnologia remanescente, recurso mais valioso, maior perigo atual, novas gírias e crenças, e uma regra de sobrevivência número 1. Adicione um cenário: meu personagem encontra um objeto do passado que muda tudo."
    },
    {
        id: 39,
        titulo: "Cena de Filme (Storyboard)",
        categoria: "personagem",
        texto: "Descreva uma cena de filme no formato storyboard. Inclua: enquadramento (plano geral, close, etc.), movimento de câmera (pan, steadicam, drone), iluminação (luz dura, suave, contraluz), paleta de cores dominante, trilha sonora/efeitos sonoros e diálogo. A descrição deve ser visual e cinematográfica, como se estivesse vendo o filme."

    {

        titulo: "Crítica Cinematográfica",

        texto: "Atue como crítico de cinema renomado. Analise roteiro (originalidade, ritmo), atuação (destaques), direção (estilo visual), fotografia (planos e cores), trilha sonora (impacto emocional) e contexto cultural (relevância). Dê nota final de 0 a 10 e recomende para qual público. Compare com um filme similar."

            const grid = document.getElementById('promptsGrid');
            const filterButtons = document.querySelectorAll('.filter-btn');
            const themeToggle = document.getElementById('themeToggle');
            const toast = document.getElementById('toast');
            let toastTimer = null;

            function renderPrompts(filter = 'todos') {
                const filtered = filter === 'todos' ? prompts : prompts.filter(p => p.categoria === filter);
                grid.innerHTML = '';
                filtered.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'prompt-card';
                    card.dataset.categoria = p.categoria;
                    const badgeMap = {
                        'edicao': 'Edição',
                        'jogo': 'Jogo',
                        'personagem': 'Personagem',
                        'mundo': 'Mundo',
                        'cena': 'Cena'
                    };
                    const label = badgeMap[p.categoria] || p.categoria;
                    card.innerHTML = `
                        <span class="badge ${p.categoria}">${label}</span>
                        <h3>${p.titulo}</h3>
                        <div class="prompt-text">${p.texto}</div>
                        <button class="copy-btn" data-id="${p.id}">Copiar Prompt</button>
                    `;
                    grid.appendChild(card);
                });

                document.querySelectorAll('.copy-btn').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        const id = parseInt(this.dataset.id);
                        const prompt = prompts.find(p => p.id === id);
                        if (prompt) {
                            navigator.clipboard.writeText(prompt.texto).then(() => {
                                this.textContent = 'Copiado!';
                                this.classList.add('copied');
                                showToast('Prompt copiado!');
                                setTimeout(() => {
                                    this.textContent = 'Copiar Prompt';
                                    this.classList.remove('copied');
                                }, 2000);
                            }).catch(() => {
                                fallbackCopy(prompt.texto, this);
                            });
                        }
                    });
                });
            }

            function fallbackCopy(text, btn) {
                const area = document.createElement('textarea');
                area.value = text;
                document.body.appendChild(area);
                area.select();
                try {
                    document.execCommand('copy');
                    btn.textContent = 'Copiado!';
                    btn.classList.add('copied');
                    showToast('Prompt copiado!');
                    setTimeout(() => {
                        btn.textContent = 'Copiar Prompt';
                        btn.classList.remove('copied');
                    }, 2000);
                } catch (err) {
                    showToast('Erro ao copiar. Tente manualmente.');
                }
                document.body.removeChild(area);
            }

            function showToast(msg) {
                toast.textContent = msg;
                toast.classList.add('show');
                if (toastTimer) clearTimeout(toastTimer);
                toastTimer = setTimeout(() => {
                    toast.classList.remove('show');
                }, 2000);
            }

            filterButtons.forEach(btn => {
                btn.addEventListener('click', function() {
                    filterButtons.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    renderPrompts(this.dataset.filter);
                });
            });

            themeToggle.addEventListener('click', function() {
                document.body.classList.toggle('dark');
                const isDark = document.body.classList.contains('dark');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
            });

            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark');
            }

            renderPrompts('todos');
        })();
    </script>
</body>
